<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junkie</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="sidebar">
        <button class="toggle-button" onclick="toggleSidebar()">Toggle Sidebar</button>
        <nav class="nav-links">
            <a href="#tab1">Tab 1</a>
            <a href="#tab2">Tab 2</a>
            <a href="#tab3">Tab 3</a>
        </nav>
    </div>
    <div class="content">
        <input type="text" id="search-bar" placeholder="Search tabs..." oninput="filterTabs()">
        <div class="tabs">
            <div id="tab1">Content for Tab 1</div>
            <div id="tab2">Content for Tab 2</div>
            <div id="tab3">Content for Tab 3</div>
        </div>
        <div class="gallery">
            <img src="image1.jpg" alt="Gallery Image 1" class="gallery-item" onclick="openModal('image1.jpg')">
            <img src="image2.jpg" alt="Gallery Image 2" class="gallery-item" onclick="openModal('image2.jpg')">
            <img src="image3.jpg" alt="Gallery Image 3" class="gallery-item" onclick="openModal('image3.jpg')">
        </div>
    </div>
    <div id="modal" class="modal" onclick="closeModal()">
        <img src="" alt="Modal Image" id="modal-image">
    </div>
</body>
</html>

<script>
function toggleSidebar() {
    document.querySelector('.sidebar').classList.toggle('active');
}
function filterTabs() {
    const searchValue = document.getElementById('search-bar').value.toLowerCase();
    const tabs = document.querySelectorAll('.tabs > div');
    tabs.forEach(tab => {
        tab.style.display = tab.textContent.toLowerCase().includes(searchValue) ? 'block' : 'none';
    });
}
function openModal(imageSrc) {
    const modal = document.getElementById('modal');
    const modalImg = document.getElementById('modal-image');
    modalImg.src = imageSrc;
    modal.style.display = 'block';
}
function closeModal() {
    document.getElementById('modal').style.display = 'none';
}
</script>
